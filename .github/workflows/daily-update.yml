name: Daily Data Update

on:
  schedule:
    - cron: '0 6 * * *'   # Runs at 6:00 AM UTC every day
  workflow_dispatch:     # Allows you to trigger manually

permissions:
  contents: write   # 🔑 Required to allow push back to the repo

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # IMPORTANT for rebase/reset to work properly

      - name: 🔄 Sync with main before running
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'


      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧠 Confirm updater contains ERV call
        run: |
          echo "Commit:"
          git rev-parse --short HEAD
          echo "Searching for ERV call in data_updater.py..."
          grep -n "fetch_waterlicence_authorization_raw" -n data_updater.py || true
          echo "Bottom of data_updater.py:"
          tail -n 40 data_updater.py

      - name: ▶️ Run data updater script
        run: python data_updater.py
        
      - name: 🧭 Locate any licence CSV anywhere
        run: |
          echo "Find any licence/authorization CSV anywhere in repo:"
          find . -type f \( -iname "*WaterLicence*csv" -o -iname "*Authorization*csv" -o -iname "*WaterAct*csv" \) -print

      - name: 🔎 Verify ERV file exists (debug)
        run: |
          pwd
          echo "---- data folder contents ----"
          ls -lah data || true
          echo "---- find authorization csv ----"
          find . -maxdepth 3 -type f -name "*Authorization*.csv" -o -name "*WaterLicence*.csv" || true
          test -f data/WaterLicence_Authorization.csv && echo "✅ Found data/WaterLicence_Authorization.csv" || (echo "❌ Missing data/WaterLicence_Authorization.csv" && exit 1)
        
      - name: 📤 Export PowerBI CSV
        run: python export_pbi_csv.py

      - name: 🔎 Verify ERV file still exists after export (debug)
        run: |
          ls -lah data || true
          test -f data/WaterLicence_Authorization.csv && echo "✅ Still present" || (echo "❌ Disappeared after export_pbi_csv.py" && exit 1)

        
      - name: 📂 Show changed files (debugging)
        run: git status

      - name: ✅ Commit and push data changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/AB_WS_R_stations.geojson \
                  data/WS_R_master_daily.parquet \
                  data/pbi_flow_thresholds_05CC_plus_05CB007.csv \
                  data/WaterLicence_Authorization.csv

          git status

          if git diff --cached --quiet; then
            echo "No changes staged; skipping commit + push."
            exit 0
          fi

          git commit -m "Automated daily data update: $(date -u +'%Y-%m-%d')"
          git push --force-with-lease origin HEAD:main




      - name: 📏 Check data folder size
        run: du -sh data
